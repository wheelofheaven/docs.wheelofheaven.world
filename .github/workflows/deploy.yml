# Build the docs site with Zola and deploy /public to gh-pages.
# Cloudflare Pages watches the gh-pages branch and rebuilds the live site.
on:
  push:
    branches: [main]
  workflow_dispatch:

name: Build and deploy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: install build tools
        uses: jdx/mise-action@v2

      - name: zola build
        run: zola build

      - name: deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
