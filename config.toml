base_url = "https://docs.wheelofheaven.world"
default_language = "en"
theme = "docs-theme"
title = "Wheel of Heaven Docs"
description = "Author, contributor, and developer documentation for the Wheel of Heaven knowledge base."

compile_sass = true
build_search_index = true
generate_feeds = false
minify_html = true

[markdown]
smart_punctuation = true
external_links_target_blank = true
external_links_no_referrer = true
bottom_footnotes = true
insert_anchor_links = "right"

# Syntax highlighting: class-based, dual light/dark themes.
# Zola/giallo emits /giallo-light.css and /giallo-dark.css; base.html
# loads both with media-query attributes so the OS preference picks
# the right one by default, and theme-toggle.js swaps them on
# explicit user override.
[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[search]
index_format = "fuse_json"
truncate_content_length = 2000

[extra]
author = "Wheel of Heaven"
github_repo = "https://github.com/wheelofheaven/docs.wheelofheaven.world"
upstream_site = "https://www.wheelofheaven.world"
