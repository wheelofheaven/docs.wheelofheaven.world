{# Right-side ToC — rendered from page.toc when present. #}

{% if page and page.toc %}
<h3 class="toc__heading">On this page</h3>
<ul class="toc__list">
    {% for h1 in page.toc %}
        <li class="toc__item">
            <a class="toc__link" href="#{{ h1.id }}">{{ h1.title }}</a>
            {% if h1.children %}
            <ul class="toc__sublist">
                {% for h2 in h1.children %}
                <li class="toc__item">
                    <a class="toc__link" href="#{{ h2.id }}">{{ h2.title }}</a>
                </li>
                {% endfor %}
            </ul>
            {% endif %}
        </li>
    {% endfor %}
</ul>
{% endif %}
