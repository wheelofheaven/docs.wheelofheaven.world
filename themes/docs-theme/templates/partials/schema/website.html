<!-- Schema.org WebSite — landing page only -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "@id": "{{ config.base_url | safe }}/#website",
  "name": "{{ config.title }}",
  "alternateName": ["Wheel of Heaven Docs", "docs.wheelofheaven.world"],
  "description": "{{ config.description | escape }}",
  "url": "{{ config.base_url | safe }}",
  "inLanguage": "en",
  "publisher": { "@id": "{{ config.base_url | safe }}/#organization" },
  "potentialAction": [
    {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "{{ config.base_url | safe }}/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  ],
  "hasPart": [
    { "@type": "WebPage", "name": "Getting Started",        "url": "{{ config.base_url | safe }}/getting-started/" },
    { "@type": "WebPage", "name": "Contributing → Content", "url": "{{ config.base_url | safe }}/contributing/content/" },
    { "@type": "WebPage", "name": "Contributing → Dev",     "url": "{{ config.base_url | safe }}/contributing/dev/" },
    { "@type": "WebPage", "name": "Architecture",           "url": "{{ config.base_url | safe }}/architecture/" },
    { "@type": "WebPage", "name": "Reference",              "url": "{{ config.base_url | safe }}/reference/" }
  ],
  "license": "https://creativecommons.org/publicdomain/zero/1.0/",
  "isAccessibleForFree": true,
  "copyrightHolder": { "@id": "{{ config.base_url | safe }}/#organization" }
}
</script>
